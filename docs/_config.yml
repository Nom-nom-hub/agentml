title: AgentML
description: Contract language for AI coding agents
theme: null
permalink: pretty
baseurl: "/agentml"
url: "https://nom-nom-hub.github.io"
sass:
  style: compressed
  load_paths:
    - _sass
collections:
  docs:
    output: true
    permalink: /:collection/:name
defaults:
  - scope:
      path: ""
      type: docs
    values:
      layout: default
      nav: docs
  - scope:
      path: ""
      type: pages
    values:
      layout: default
