<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}AgentML</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Contract language for AI coding agents{% endif %}">
  <meta name="theme-color" content="#07080c">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}AgentML{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Contract language for AI coding agents{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nom-nom-hub.github.io/agentml/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07080c;
      --bg-secondary: #0c0f15;
      --bg-elevated: #11141b;
      --bg-tertiary: #161a23;
      --bg-panel: rgba(255,255,255,0.03);
      --bg-deep: #040508;
      --text: #e6e8ee;
      --text-secondary: #9ca3b4;
      --text-muted: #5a6270;
      --accent-cyan: #00e5ff;
      --accent-violet: #8b5cf6;
      --accent-blue: #3b82f6;
      --accent-red: #ef4444;
      --accent-amber: #f59e0b;
      --accent-green: #10b981;
      --border: rgba(255,255,255,0.07);
      --border-subtle: rgba(255,255,255,0.04);
      --code-bg: #080a0f;
      --success: #10b981;
      --radius: 14px;
      --radius-sm: 8px;
      --max-width: 1160px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    ::selection { background: rgba(0,229,255,0.25); color: #fff; }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover { color: #fff; text-decoration: underline; }

    code, pre, kbd, samp {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 28px;
    }
    /* ===== NAVIGATION ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7,8,12,0.78);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border-bottom: 1px solid var(--border);
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
    }
    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 800;
      color: #000;
      box-shadow: 0 0 24px rgba(0,229,255,0.18);
    }
    .nav-list {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-list a {
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: all 0.2s;
      text-decoration: none;
    }
    .nav-list a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      text-decoration: none;
    }
    .nav-cta {
      margin-left: 10px;
      background: rgba(0,229,255,0.08) !important;
      border: 1px solid rgba(0,229,255,0.25);
      color: var(--accent-cyan) !important;
    }
    .nav-cta:hover {
      background: rgba(0,229,255,0.12) !important;
      border-color: rgba(0,229,255,0.4) !important;
    }
    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      font-size: 18px;
      line-height: 1;
    }
    @media (max-width: 768px) {
      .nav-list {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 64px;
        left: 0; right: 0;
        background: rgba(7,8,12,0.96);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 12px;
        gap: 2px;
      }
      .nav-list.open { display: flex; }
      .nav-list a {
        padding: 10px 12px;
        border-radius: 8px;
        width: 100%;
      }
      .nav-cta { margin-left: 0; }
      .mobile-toggle { display: block; }
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3 { letter-spacing: -0.02em; line-height: 1.15; }
    h1 { font-size: clamp(40px, 5.2vw, 64px); font-weight: 800; }
    h2 { font-size: clamp(28px, 3.2vw, 38px); font-weight: 700; }
    h3 { font-size: 18px; font-weight: 600; }
    .section-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.18);
      color: var(--accent-cyan);
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--text);
      color: #000;
      border-color: var(--text);
    }
    .btn-primary:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255,255,255,0.1);
    }
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
      text-decoration: none;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 120px 0 100px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .hero-glow {
      position: absolute;
      width: 900px;
      height: 900px;
      top: -300px;
      right: -100px;
      background: radial-gradient(circle, rgba(139,92,246,0.14) 0%, rgba(0,229,255,0.04) 40%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .hero-glow-secondary {
      position: absolute;
      width: 700px;
      height: 700px;
      bottom: -200px;
      left: -100px;
      background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }
    .hero .container {
      position: relative;
      z-index: 1;
    }
    .hero-grid-layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 72px;
      align-items: center;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.2);
      color: var(--accent-cyan);
      letter-spacing: 0.01em;
    }
    .badge-secondary {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .hero h1 {
      font-size: clamp(40px, 5.2vw, 64px);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.06;
      margin-bottom: 22px;
      background: linear-gradient(180deg, #ffffff 0%, #7e879d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 560px;
      margin-bottom: 32px;
      line-height: 1.65;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }
    .command-pill {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--bg-elevated);
      border: 1px solid rgba(0,229,255,0.25);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(0,229,255,0.06), 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .command-pill code {
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--text);
      color: #000;
      border-color: var(--text);
    }
    .btn-primary:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255,255,255,0.1);
    }
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
      text-decoration: none;
    }

    /* ===== TERMINAL ===== */
    .terminal {
      background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 100%);
      border: 1px solid rgba(0,229,255,0.18);
      border-radius: var(--radius);
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.06),
        0 24px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: hidden;
      position: relative;
    }
    .terminal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.008) 3px,
        rgba(255,255,255,0.008) 4px
      );
      pointer-events: none;
      z-index: 2;
    }
    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.32);
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      z-index: 1;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .terminal-title {
      margin-left: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-cyan);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .terminal-body {
      padding: 22px 24px;
      position: relative;
      z-index: 1;
      background: rgba(4,5,8,0.35);
    }
    .terminal-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
      display: flex;
      gap: 6px;
    }
    .prompt { color: var(--text-muted); user-select: none; }
    .cmd { color: var(--text); }
    .ok { color: var(--accent-green); }
    .info { color: var(--accent-cyan); }
    .system-ready {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--accent-green);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 10px var(--accent-green), 0 0 20px rgba(16,185,129,0.3);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    /* ===== MANIFESTO ===== */
    .manifesto {
      padding: 36px 0;
      border-top: 1px solid var(--border-subtle);
      border-bottom: 1px solid var(--border-subtle);
      background: linear-gradient(90deg, rgba(139,92,246,0.07), transparent 40%, transparent 60%, rgba(0,229,255,0.05));
      position: relative;
      overflow: hidden;
    }
    .manifesto::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    .manifesto p {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      max-width: 820px;
      margin: 0 auto;
    }

    /* ===== SECTIONS ===== */
    section.content { padding: 88px 0; }
    section.content.alt { background: var(--bg-secondary); }
    .section-title {
      font-size: clamp(26px, 3.2vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .section-subtitle {
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 620px;
      margin: 0 auto 56px;
    }
    .text-center { text-align: center; }

    /* ===== DIAGNOSTIC PANELS ===== */
    .diagnostic-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .diagnostic-panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .diagnostic-panel:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .panel-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
      color: var(--accent-red);
    }
    .panel-indicator-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-red);
      box-shadow: 0 0 12px var(--accent-red);
    }
    .diagnostic-panel h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .diagnostic-panel p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ===== PIPELINE ===== */
    .pipeline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin: 64px 0;
      flex-wrap: wrap;
    }
    .pipeline-node {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      text-align: center;
      min-width: 150px;
      position: relative;
      z-index: 1;
      transition: all 0.3s;
    }
    .pipeline-node.active-cyan {
      border-color: rgba(0,229,255,0.35);
      box-shadow: 0 0 0 1px rgba(0,229,255,0.06), 0 0 30px rgba(0,229,255,0.08);
    }
    .pipeline-node.active-violet {
      border-color: rgba(139,92,246,0.35);
      box-shadow: 0 0 0 1px rgba(139,92,246,0.08), 0 0 30px rgba(139,92,246,0.08);
    }
    .pipeline-node.active-green {
      border-color: rgba(16,185,129,0.35);
      box-shadow: 0 0 0 1px rgba(16,185,129,0.08), 0 0 30px rgba(16,185,129,0.08);
    }
    .pipeline-node-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pipeline-node.active-cyan .pipeline-node-label { color: var(--accent-cyan); }
    .pipeline-node.active-violet .pipeline-node-label { color: var(--accent-violet); }
    .pipeline-node.active-green .pipeline-node-label { color: var(--accent-green); }
    .pipeline-node-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .pipeline-arrow {
      color: var(--text-muted);
      font-size: 20px;
      padding: 0 8px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* ===== FEATURE CARDS ===== */
    .feature-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 14px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.18);
      color: var(--accent-cyan);
    }
    .feature-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.18);
      display: grid;
      place-items: center;
      font-size: 14px;
      color: var(--accent-cyan);
      margin-bottom: 16px;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    .feature-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      transition: all 0.3s;
      position: relative;
    }
    .feature-card:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .feature-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .feature-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0 0 14px;
    }
    .feature-code {
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      overflow-x: auto;
      white-space: pre;
      margin-top: 10px;
    }

    /* ===== COMPARISON MATRIX ===== */
    .matrix-wrapper { overflow-x: auto; margin-top: 28px; }
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .comparison-table th,
    .comparison-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-subtle);
    }
    .comparison-table thead th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.015);
    }
    .comparison-table tbody tr { transition: background 0.2s; }
    .comparison-table tbody tr:hover { background: rgba(255,255,255,0.01); }
    .comparison-table .highlight-row {
      background: rgba(0,229,255,0.025);
    }
    .comparison-table .highlight-row td {
      color: var(--text);
      font-weight: 500;
    }
    .comparison-table .highlight-row td:first-child { color: var(--accent-cyan); font-weight: 600; }
    .comparison-table .check { color: var(--accent-green); }
    .comparison-table .cross { color: var(--text-muted); opacity: 0.4; }

    /* ===== DEMO ===== */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    .demo-panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .demo-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(0,0,0,0.2);
    }
    .demo-panel-header.strong {
      color: var(--accent-cyan);
      background: rgba(0,229,255,0.05);
      border-color: rgba(0,229,255,0.2);
    }
    .demo-panel-body {
      padding: 22px;
    }
    .demo-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-secondary);
      display: flex;
      gap: 8px;
    }
    .demo-line .cmd { color: var(--text); }
    .demo-line.danger { color: var(--accent-red); }
    .demo-line.success { color: var(--accent-green); }
    .demo-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-top: 16px;
    }
    .demo-status.pass {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--accent-green);
    }

    /* ===== QUICKSTART ===== */
    .qs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 48px;
    }
    .qs-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all 0.3s;
    }
    .qs-card:hover {
      border-color: rgba(0,229,255,0.3);
      box-shadow: 0 0 40px -12px rgba(0,229,255,0.2);
      transform: translateY(-2px);
    }
    .qs-step {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .qs-command {
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      margin-top: 6px;
    }

    /* ===== TEMPLATES ===== */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .template-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: all 0.3s;
    }
    .template-card:hover {
      border-color: rgba(139,92,246,0.35);
      box-shadow: 0 0 30px -8px rgba(139,92,246,0.15);
      transform: translateY(-2px);
    }
    .template-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .template-name code {
      color: var(--accent-violet);
    }
    .template-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .template-cmd {
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent-cyan);
      margin-bottom: 12px;
    }
    .template-files {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.7;
      padding-left: 10px;
    }
    .template-files li {
      margin: 4px 0;
      position: relative;
    }
    .template-files li::before {
      content: "—";
      position: absolute;
      left: -10px;
      color: var(--text-muted);
    }
    @media (max-width: 900px) {
      .template-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .template-grid { grid-template-columns: 1fr; }
    }

    /* ===== DOGFOODING ===== */
    .verify-console {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.9;
      max-width: 700px;
      margin: 0 auto 24px;
    }
    .verify-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 12px;
    }
    .verify-row:last-child { border-bottom: none; }
    .verify-row .cmd { color: var(--text-secondary); }
    .verify-row .status {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 4px;
    }
    .status-pass {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--accent-green);
    }
    .status-valid {
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.18);
      color: var(--accent-cyan);
    }

    /* ===== FAQ ===== */
    .faq-grid {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }
    .faq-item {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.2s;
    }
    .faq-item:hover {
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.015);
    }
    .faq-question {
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      padding: 18px 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .faq-arrow {
      transition: transform 0.2s;
      color: var(--text-muted);
      font-size: 12px;
    }
    .faq-item.open .faq-arrow { transform: rotate(180deg); color: var(--accent-cyan); }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .faq-answer-inner {
      padding: 0 22px 18px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }
    .faq-item.open .faq-answer { max-height: 300px; }

    /* ===== CTA ===== */
    .cta-section {
      position: relative;
      overflow: hidden;
      border-top: 1px solid var(--border-subtle);
      border-bottom: 1px solid var(--border-subtle);
    }
    .cta-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .cta-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 96px 0;
    }
    .cta-title {
      font-size: clamp(28px, 3.6vw, 40px);
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 14px;
    }
    .cta-sub {
      color: var(--text-secondary);
      font-size: 17px;
      max-width: 540px;
      margin: 0 auto 36px;
    }
    .cta-install {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px;
      background: var(--bg-elevated);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 999px;
      margin-bottom: 22px;
      box-shadow: 0 0 0 1px rgba(0,229,255,0.06), 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .cta-install code {
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .cta-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent-cyan);
      color: #000;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s;
      z-index: 200;
      box-shadow: 0 12px 40px rgba(0,229,255,0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .hero-grid-layout {
        grid-template-columns: 1fr;
        gap: 48px;
      }
      .diagnostic-grid {
        grid-template-columns: 1fr;
      }
      .demo-grid {
        grid-template-columns: 1fr;
      }
      .qs-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .hero { padding: 72px 0 60px; }
      section.content { padding: 64px 0; }
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="/docs/" class="logo">
        <div class="logo-mark">A</div>
        <span>AgentML</span>
      </a>
      <button class="mobile-toggle" aria-label="Toggle menu" onclick="document.querySelector('.nav-list').classList.toggle('open')">☰</button>
      <ul class="nav-list">
        <li><a href="/docs/">Quickstart</a></li>
        <li><a href="#features">Features</a></li>
        <li><a href="#demo">Demo</a></li>
        <li><a href="#docs">Docs</a></li>
        <li><a href="https://github.com/Nom-nom-hub/agentml" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="https://crates.io/crates/agentml" target="_blank" rel="noopener" class="nav-cta">Install</a></li>
      </ul>
    </div>
  </header>
  <div class="toast" id="toast">Copied to clipboard</div>
  {{ content }}
  <footer>
    <div class="container">
      <p>
        <strong style="color:var(--text);">AgentML</strong>
        <span style="margin: 0 6px; opacity: 0.3;">·</span>
        Contract language for AI coding agents
        <span style="margin: 0 6px; opacity: 0.3;">·</span>
        <a href="https://github.com/Nom-nom-hub/agentml" target="_blank" rel="noopener">GitHub</a>
        <span style="margin: 0 4px; opacity: 0.3;">·</span>
        <a href="https://crates.io/crates/agentml" target="_blank" rel="noopener">crates.io</a>
        <span style="margin: 0 4px; opacity: 0.3;">·</span>
        <span>MIT License</span>
        <span style="margin: 0 4px; opacity: 0.3;">·</span>
        <span>v0.1.2</span>
        <span style="margin: 0 4px; opacity: 0.3;">·</span>
        <span>Built in Rust</span>
      </p>
    </div>
  </footer>
  <div class="toast" id="toast">Copied to clipboard</div>
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
      anchor.addEventListener('click', function(e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    function copy(text, btn) {
      navigator.clipboard.writeText(text).then(function() {
        var t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2000);
        if (btn) {
          btn.textContent = 'Copied';
          setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        }
      });
    }

    document.querySelectorAll('.faq-question').forEach(function(q) {
      q.addEventListener('click', function() {
        this.closest('.faq-item').classList.toggle('open');
      });
    });
  </script>
</body>
</html>
