name: AgentML Self Check

on:
  push:
  pull_request:

jobs:
  self-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: AgentML validates itself
        run: cargo run -- validate AGENT.agent

      - name: AgentML brief
        run: cargo run -- brief --format json

      - name: AgentML diff audit
        run: cargo run -- diff || echo "No changes to audit"

      - name: AgentML doctor
        run: cargo run -- doctor

      - name: AgentML self-check
        run: cargo run -- self-check